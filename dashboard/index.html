<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Access — Queen Homes Realty</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png?v=2">
  <link rel="shortcut icon" type="image/png" href="../assets/images/logo.png?v=2">
  <link rel="apple-touch-icon" href="../assets/images/logo.png?v=2">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .access-card { background: var(--dark-2); border: 1px solid var(--dark-4); border-radius: 14px; padding: 32px; max-width: 440px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .access-title { color: var(--white); font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .access-subtitle { color: var(--gray-400); font-size: 13px; text-align: center; line-height: 1.6; margin-bottom: 22px; padding: 0 8px; }

    .tab-switch { display: grid; grid-template-columns: 1fr 1fr; background: var(--dark-3); border-radius: 10px; padding: 4px; margin-bottom: 22px; }
    .tab-switch button { background: transparent; color: var(--gray-400); border: 0; padding: 10px 16px; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all .2s; font-family: inherit; }
    .tab-switch button.active { background: var(--dark); color: var(--white); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .access-card .form-group { margin-bottom: 14px; }
    .access-card label { display: block; color: var(--white); font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .access-card .form-control { width: 100%; background: var(--dark); border: 1px solid var(--dark-4); color: var(--white); padding: 12px 14px; border-radius: 10px; font-size: 14px; outline: none; transition: border-color .2s; }
    .access-card .form-control:focus { border-color: var(--gold); }

    .access-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: #fff; border: 0; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform .1s, box-shadow .2s; font-family: inherit; margin-top: 6px; }
    .access-btn:hover:not(:disabled) { box-shadow: 0 6px 16px rgba(195, 138, 49, 0.35); }
    .access-btn:active { transform: translateY(1px); }
    .access-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .access-msg { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
    .access-msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    .access-msg.success { background: rgba(195,138,49,0.1); border: 1px solid rgba(195,138,49,0.4); color: var(--gold); }
    .access-msg.active { display: block; }

    .access-footer { text-align: center; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--dark-4); }
    .access-footer a { font-size: 12px; color: var(--gray-400); }

    .success-state { text-align: center; padding: 10px 0; }
    .success-state i { font-size: 42px; color: var(--gold); margin-bottom: 10px; }
    .success-state h3 { color: var(--white); margin-bottom: 8px; font-size: 18px; }
    .success-state p { color: var(--gray-400); font-size: 13px; line-height: 1.6; }

    .login-page { background: var(--dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .brand-mark { text-align: center; margin-bottom: 18px; }
    .brand-mark .logo-icon { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 26px; font-weight: 700; }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="access-card">

      <div class="brand-mark"><div class="logo-icon">Q</div></div>

      <h1 class="access-title">Admin access</h1>
      <p class="access-subtitle">Sign in to manage Queen Homes Realty content. New admin accounts require super-user approval.</p>

      <div class="tab-switch" role="tablist">
        <button type="button" class="active" data-tab="signin" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
        <button type="button" data-tab="signup" id="tab-signup" onclick="switchTab('signup')">Sign up</button>
      </div>

      <div class="access-msg" id="msg"></div>

      <!-- Sign in panel -->
      <div class="tab-panel active" id="panel-signin">
        <form id="signin-form">
          <div class="form-group">
            <label for="signin-email">Email</label>
            <input type="email" id="signin-email" class="form-control" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="signin-password">Password</label>
            <input type="password" id="signin-password" class="form-control" autocomplete="current-password" required>
          </div>
          <button type="submit" class="access-btn" id="signin-btn">Sign in</button>
        </form>
      </div>

      <!-- Sign up panel -->
      <div class="tab-panel" id="panel-signup">
        <form id="signup-form">
          <div class="form-group">
            <label for="signup-name">Name</label>
            <input type="text" id="signup-name" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" class="form-control" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" class="form-control" autocomplete="new-password" minlength="8" required>
          </div>
          <button type="submit" class="access-btn" id="signup-btn">Request admin access</button>
        </form>
      </div>

      <!-- Success state (after signup) -->
      <div class="success-state" id="success-state" style="display:none;">
        <i class="fas fa-check-circle"></i>
        <h3>Request submitted</h3>
        <p>Your request has been sent to the super admin. Once approved, you'll be able to sign in with the email and password you just set.</p>
      </div>

      <div class="access-footer">
        <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
      </div>

    </div>
  </div>

  <!-- Plain script — tab switching runs regardless of whether the module script below loads -->
  <script>
    function switchTab(tab) {
      var msg = document.getElementById('msg');
      if (msg) msg.className = 'access-msg';
      var tabSignin = document.getElementById('tab-signin');
      var tabSignup = document.getElementById('tab-signup');
      var panelSignin = document.getElementById('panel-signin');
      var panelSignup = document.getElementById('panel-signup');
      if (!tabSignin || !tabSignup || !panelSignin || !panelSignup) return;
      if (tab === 'signin') {
        tabSignin.classList.add('active'); tabSignup.classList.remove('active');
        panelSignin.classList.add('active'); panelSignup.classList.remove('active');
      } else {
        tabSignup.classList.add('active'); tabSignin.classList.remove('active');
        panelSignup.classList.add('active'); panelSignin.classList.remove('active');
      }
    }
  </script>

  <script type="module">
    import {
      auth, db,
      signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged,
      collection, addDoc, query, where, getDocs, serverTimestamp
    } from './js/firebase-config.js';

    // Show denied message if the route guard kicked them out
    var params = new URLSearchParams(window.location.search);
    if (params.get('denied') === '1') showMsg('error', 'Your account is not approved yet. You can sign up below or wait for the super admin to approve your request.');

    // If already logged in AND authorized, redirect. (requireAuth on other pages handles unauthorized.)
    onAuthStateChanged(auth, function(user) {
      if (user && window.location.pathname.endsWith('/dashboard/') === false && params.get('denied') !== '1') {
        // Don't auto-redirect from the login page if they came here after denial
      }
      if (user && params.get('denied') !== '1') {
        window.location.href = 'dashboard.html';
      }
    });

    // Tab switching is handled by the plain script above (switchTab on window scope)

    // ── Message helpers ──
    function showMsg(type, text) {
      var el = document.getElementById('msg');
      el.className = 'access-msg active ' + type;
      el.textContent = text;
    }
    function hideMsg() { document.getElementById('msg').className = 'access-msg'; }

    // ── Sign in ──
    document.getElementById('signin-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideMsg();
      var email = document.getElementById('signin-email').value.trim();
      var password = document.getElementById('signin-password').value;
      var btn = document.getElementById('signin-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      console.log('[signin] Attempting sign-in for:', email);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        console.log('[signin] Success — redirecting to dashboard');
        window.location.href = 'dashboard.html';
      } catch (err) {
        console.error('[signin] Failed:', err.code, err.message);
        var msg;
        switch (err.code) {
          case 'auth/user-not-found':
            msg = 'No account exists for this email. Use the Sign up tab to request access.'; break;
          case 'auth/wrong-password':
            msg = 'Wrong password.'; break;
          case 'auth/invalid-credential':
            msg = 'Invalid email or password. Check both fields and try again.'; break;
          case 'auth/invalid-email':
            msg = 'That email format is invalid.'; break;
          case 'auth/too-many-requests':
            msg = 'Too many failed attempts. Wait a few minutes and try again.'; break;
          case 'auth/network-request-failed':
            msg = 'Network error. Check your internet connection.'; break;
          case 'auth/user-disabled':
            msg = 'This account has been disabled.'; break;
          default:
            msg = 'Sign-in failed: ' + (err.code || err.message || 'unknown error');
        }
        showMsg('error', msg);
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    });

    // ── Sign up (creates locked Auth account + request for super admin to review) ──
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideMsg();
      var name = document.getElementById('signup-name').value.trim();
      var email = document.getElementById('signup-email').value.trim().toLowerCase();
      var password = document.getElementById('signup-password').value;
      var btn = document.getElementById('signup-btn');
      btn.disabled = true; btn.textContent = 'Submitting…';

      try {
        // Prevent duplicate pending request from same email
        var existing = await getDocs(query(collection(db, 'admin_requests'), where('email','==',email), where('status','==','pending')));
        if (!existing.empty) throw new Error('A pending request already exists for this email.');

        // Create Firebase Auth account (auto-signs in — we'll sign out right after)
        await createUserWithEmailAndPassword(auth, email, password);

        // Submit the request while signed in (so rules can attribute it)
        await addDoc(collection(db, 'admin_requests'), {
          name: name,
          email: email,
          status: 'pending',
          createdAt: serverTimestamp()
        });

        // Sign out — user cannot access dashboard until approved anyway
        await signOut(auth);

        // Show success state
        document.getElementById('signup-form').style.display = 'none';
        document.querySelector('.tab-switch').style.display = 'none';
        document.querySelector('.access-subtitle').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';
      } catch (err) {
        var msg = err.message || 'Could not submit request.';
        if (err.code === 'auth/email-already-in-use') msg = 'An account already exists for this email. Use the Sign in tab, or contact the super admin.';
        else if (err.code === 'auth/weak-password') msg = 'Password is too weak. Use at least 8 characters.';
        else if (err.code === 'auth/invalid-email') msg = 'That email address looks invalid.';
        showMsg('error', msg);
        btn.disabled = false; btn.textContent = 'Request admin access';
      }
    });
  </script>

</body>
</html>
