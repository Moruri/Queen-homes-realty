<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Properties — Queen Homes Admin</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png?v=2">
  <link rel="shortcut icon" type="image/png" href="../assets/images/logo.png?v=2">
  <link rel="apple-touch-icon" href="../assets/images/logo.png?v=2">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-icon">Q</div>
        <h2><span>Queen</span> Homes<small>Admin Panel</small></h2>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-nav-label">Main</div>
        <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="properties.html" class="active"><i class="fas fa-building"></i> Properties</a>
        <a href="blog.html"><i class="fas fa-newspaper"></i> Blog Posts</a>
        <a href="inquiries.html"><i class="fas fa-envelope"></i> Inquiries</a>
        <div class="sidebar-nav-label super-only">Access Control</div>
        <a href="admin-requests.html" class="super-only"><i class="fas fa-user-shield"></i> Admin Requests <span class="pending-badge" id="sidebar-pending-badge" style="display:none;">0</span></a>
        <div class="sidebar-nav-label">Settings</div>
        <a href="settings.html"><i class="fas fa-cog"></i> Site Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="admin-header">
        <div class="admin-header-left">
          <button class="menu-toggle-admin"><i class="fas fa-bars"></i></button>
          <h1>Properties</h1>
        </div>
        <div class="admin-header-right">
          <a href="../index.html" target="_blank" class="header-link"><i class="fas fa-external-link-alt"></i> View Site</a>
          <div class="admin-user">
            <div class="admin-user-avatar">A</div>
            <span>Admin</span>
          </div>
        </div>
      </header>

      <div class="page-content">
        <!-- Toolbar -->
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="search-input">
              <i class="fas fa-search"></i>
              <input type="text" id="search-properties" placeholder="Search properties...">
            </div>
            <select class="filter-select" id="filter-status">
              <option value="">All Statuses</option>
              <option value="For Sale">For Sale</option>
              <option value="For Rent">For Rent</option>
              <option value="Sold">Sold</option>
            </select>
          </div>
          <div class="toolbar-right">
            <a href="property-form.html" class="btn btn-primary"><i class="fas fa-plus"></i> Add Property</a>
          </div>
        </div>

        <!-- Properties Table -->
        <div class="card">
          <div class="card-body" style="padding: 0;">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Image</th>
                    <th>Property</th>
                    <th>Location</th>
                    <th>Price</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="properties-table">
                  <tr><td colspan="7"><div class="page-loader"><span class="spinner"></span></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from './js/auth.js';
    import { db, collection, getDocs, deleteDoc, doc, query, orderBy } from './js/firebase-config.js';
    import { initSidebar, setUserInitial, showToast, showConfirm, truncate } from './js/ui-helpers.js';

    var allProperties = [];

    requireAuth(async function(user) {
      initSidebar();
      setUserInitial(user);

      document.getElementById('logout-btn').addEventListener('click', function(e) {
        e.preventDefault();
        logout();
      });

      await loadProperties();

      // Search
      document.getElementById('search-properties').addEventListener('input', filterProperties);
      document.getElementById('filter-status').addEventListener('change', filterProperties);
    });

    async function loadProperties() {
      try {
        var q = query(collection(db, 'properties'), orderBy('createdAt', 'desc'));
        var snap = await getDocs(q);
        allProperties = [];
        snap.forEach(function(d) {
          allProperties.push({ id: d.id, ...d.data() });
        });
        renderProperties(allProperties);
      } catch (err) {
        console.error(err);
        document.getElementById('properties-table').innerHTML =
          '<tr><td colspan="7" style="padding:40px;text-align:center;color:var(--gray-500);">Could not load properties. Check Firebase config.</td></tr>';
      }
    }

    function renderProperties(list) {
      var tbody = document.getElementById('properties-table');

      if (list.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="7"><div class="empty-state"><i class="fas fa-building"></i><h3>No properties found</h3><p>Add your first property listing.</p><a href="property-form.html" class="btn btn-primary"><i class="fas fa-plus"></i> Add Property</a></div></td></tr>';
        return;
      }

      var html = '';
      list.forEach(function(p) {
        var statusClass = p.status === 'For Sale' ? 'badge-sale' : p.status === 'For Rent' ? 'badge-rent' : 'badge-sold';
        var img = p.image || p.images?.[0] || 'https://via.placeholder.com/60x42/1a1a1a/737373?text=No+Image';
        html +=
          '<tr>' +
            '<td><img src="' + img + '" class="table-img" alt=""></td>' +
            '<td><div class="table-title">' + truncate(p.title, 35) + '</div><div class="table-sub">' + (p.beds || '—') + ' bed, ' + (p.baths || '—') + ' bath</div></td>' +
            '<td>' + (p.location || '—') + '</td>' +
            '<td style="white-space:nowrap;">' + (p.price || '—') + '</td>' +
            '<td>' + (p.type || '—') + '</td>' +
            '<td><span class="badge ' + statusClass + '">' + (p.status || '—') + '</span></td>' +
            '<td><div class="action-btns">' +
              '<a href="property-form.html?id=' + p.id + '" class="btn-icon edit" title="Edit"><i class="fas fa-pen"></i></a>' +
              '<button class="btn-icon delete" title="Delete" data-id="' + p.id + '" data-title="' + (p.title || '') + '"><i class="fas fa-trash"></i></button>' +
            '</div></td>' +
          '</tr>';
      });

      tbody.innerHTML = html;

      // Attach delete handlers
      tbody.querySelectorAll('.delete').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          var id = this.dataset.id;
          var title = this.dataset.title;
          var confirmed = await showConfirm('Delete Property', 'Are you sure you want to delete "' + title + '"? This cannot be undone.');
          if (confirmed) {
            try {
              await deleteDoc(doc(db, 'properties', id));
              showToast('Property deleted successfully', 'success');
              await loadProperties();
            } catch (err) {
              showToast('Failed to delete property', 'error');
            }
          }
        });
      });
    }

    function filterProperties() {
      var search = document.getElementById('search-properties').value.toLowerCase();
      var status = document.getElementById('filter-status').value;

      var filtered = allProperties.filter(function(p) {
        var matchSearch = !search || (p.title || '').toLowerCase().indexOf(search) > -1 || (p.location || '').toLowerCase().indexOf(search) > -1;
        var matchStatus = !status || p.status === status;
        return matchSearch && matchStatus;
      });

      renderProperties(filtered);
    }
  </script>

</body>
</html>
