<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquiries — Queen Homes Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-icon">👑</div>
        <h2><span>Queen</span> Homes<small>Admin Panel</small></h2>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-nav-label">Main</div>
        <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="properties.html"><i class="fas fa-building"></i> Properties</a>
        <a href="blog.html"><i class="fas fa-newspaper"></i> Blog Posts</a>
        <a href="inquiries.html" class="active"><i class="fas fa-envelope"></i> Inquiries</a>
        <div class="sidebar-nav-label">Settings</div>
        <a href="settings.html"><i class="fas fa-cog"></i> Site Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="admin-header">
        <div class="admin-header-left">
          <button class="menu-toggle-admin"><i class="fas fa-bars"></i></button>
          <h1>Inquiries</h1>
        </div>
        <div class="admin-header-right">
          <div class="admin-user">
            <div class="admin-user-avatar">A</div>
            <span>Admin</span>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="search-input">
              <i class="fas fa-search"></i>
              <input type="text" id="search-inquiries" placeholder="Search inquiries...">
            </div>
            <select class="filter-select" id="filter-read">
              <option value="">All Messages</option>
              <option value="unread">Unread</option>
              <option value="read">Read</option>
            </select>
            <select class="filter-select" id="filter-subject">
              <option value="">All Subjects</option>
              <option value="buying">Buying a Property</option>
              <option value="selling">Selling a Property</option>
              <option value="renting">Renting a Property</option>
              <option value="investment">Investment Consultation</option>
              <option value="viewing">Book a Viewing</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="card">
          <div class="card-body" style="padding: 0;">
            <div id="inquiries-list">
              <div class="page-loader"><span class="spinner"></span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Inquiry Detail Modal -->
  <div class="modal-overlay" id="inquiry-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Inquiry Details</h3>
        <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from './js/auth.js';
    import { db, collection, getDocs, deleteDoc, updateDoc, doc, query, orderBy } from './js/firebase-config.js';
    import { initSidebar, setUserInitial, showToast, showConfirm, formatDate } from './js/ui-helpers.js';

    var allInquiries = [];

    requireAuth(async function(user) {
      initSidebar();
      setUserInitial(user);

      document.getElementById('logout-btn').addEventListener('click', function(e) {
        e.preventDefault();
        logout();
      });

      // Close modal
      document.getElementById('modal-close').addEventListener('click', function() {
        document.getElementById('inquiry-modal').classList.remove('active');
      });
      document.getElementById('inquiry-modal').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('active');
      });

      await loadInquiries();

      document.getElementById('search-inquiries').addEventListener('input', filterInquiries);
      document.getElementById('filter-read').addEventListener('change', filterInquiries);
      document.getElementById('filter-subject').addEventListener('change', filterInquiries);
    });

    async function loadInquiries() {
      try {
        var q = query(collection(db, 'inquiries'), orderBy('createdAt', 'desc'));
        var snap = await getDocs(q);
        allInquiries = [];
        snap.forEach(function(d) {
          allInquiries.push({ id: d.id, ...d.data() });
        });
        renderInquiries(allInquiries);
      } catch (err) {
        console.error(err);
        document.getElementById('inquiries-list').innerHTML =
          '<div style="padding:40px;text-align:center;color:var(--gray-500);">Could not load inquiries.</div>';
      }
    }

    function renderInquiries(list) {
      var container = document.getElementById('inquiries-list');

      if (list.length === 0) {
        container.innerHTML =
          '<div class="empty-state"><i class="fas fa-envelope"></i><h3>No inquiries found</h3><p>Inquiries from your contact form will appear here.</p></div>';
        return;
      }

      var html = '';
      list.forEach(function(inq) {
        var initial = inq.firstName ? inq.firstName.charAt(0).toUpperCase() : '?';
        var unread = !inq.read ? ' unread' : '';
        var subjectMap = {
          buying: 'Buying a Property',
          selling: 'Selling a Property',
          renting: 'Renting a Property',
          investment: 'Investment Consultation',
          viewing: 'Book a Viewing',
          other: 'Other'
        };
        var subjectLabel = subjectMap[inq.subject] || inq.subject || 'General Inquiry';

        html +=
          '<div class="inquiry-card' + unread + '" data-id="' + inq.id + '">' +
            '<div class="inquiry-avatar">' + initial + '</div>' +
            '<div class="inquiry-body">' +
              '<div class="inquiry-header">' +
                '<h4>' + (inq.firstName || '') + ' ' + (inq.lastName || '') + '</h4>' +
                '<time>' + formatDate(inq.createdAt) + '</time>' +
              '</div>' +
              '<div class="inquiry-subject">' + subjectLabel + '</div>' +
              '<div class="inquiry-excerpt">' + (inq.message || 'No message') + '</div>' +
            '</div>' +
            '<div class="action-btns" style="flex-shrink:0;align-self:center;">' +
              '<button class="btn-icon delete" title="Delete" data-id="' + inq.id + '"><i class="fas fa-trash"></i></button>' +
            '</div>' +
          '</div>';
      });

      container.innerHTML = html;

      // Click to view detail
      container.querySelectorAll('.inquiry-card').forEach(function(card) {
        card.addEventListener('click', async function(e) {
          if (e.target.closest('.delete')) return;
          var id = this.dataset.id;
          var inq = allInquiries.find(function(i) { return i.id === id; });
          if (!inq) return;

          // Mark as read
          if (!inq.read) {
            try {
              await updateDoc(doc(db, 'inquiries', id), { read: true });
              inq.read = true;
              this.classList.remove('unread');
            } catch (err) { /* silent */ }
          }

          var subjectMap = {
            buying: 'Buying a Property',
            selling: 'Selling a Property',
            renting: 'Renting a Property',
            investment: 'Investment Consultation',
            viewing: 'Book a Viewing',
            other: 'Other'
          };

          document.getElementById('modal-body').innerHTML =
            '<div class="detail-row"><label>Name</label><p>' + (inq.firstName || '') + ' ' + (inq.lastName || '') + '</p></div>' +
            '<div class="detail-row"><label>Email</label><p><a href="mailto:' + (inq.email || '') + '">' + (inq.email || '—') + '</a></p></div>' +
            '<div class="detail-row"><label>Phone</label><p><a href="tel:' + (inq.phone || '') + '">' + (inq.phone || '—') + '</a></p></div>' +
            '<div class="detail-row"><label>Subject</label><p>' + (subjectMap[inq.subject] || inq.subject || '—') + '</p></div>' +
            '<div class="detail-row"><label>Date</label><p>' + formatDate(inq.createdAt) + '</p></div>' +
            '<div class="detail-row"><label>Message</label><p>' + (inq.message || 'No message provided.') + '</p></div>' +
            '<div style="display:flex;gap:12px;margin-top:20px;">' +
              '<a href="mailto:' + (inq.email || '') + '" class="btn btn-primary btn-sm"><i class="fas fa-reply"></i> Reply via Email</a>' +
              '<a href="https://wa.me/' + (inq.phone || '').replace(/[^0-9]/g, '') + '" target="_blank" class="btn btn-secondary btn-sm"><i class="fab fa-whatsapp"></i> WhatsApp</a>' +
            '</div>';

          document.getElementById('inquiry-modal').classList.add('active');
        });
      });

      // Delete handlers
      container.querySelectorAll('.delete').forEach(function(btn) {
        btn.addEventListener('click', async function(e) {
          e.stopPropagation();
          var id = this.dataset.id;
          var confirmed = await showConfirm('Delete Inquiry', 'Are you sure you want to delete this inquiry?');
          if (confirmed) {
            try {
              await deleteDoc(doc(db, 'inquiries', id));
              showToast('Inquiry deleted', 'success');
              await loadInquiries();
            } catch (err) {
              showToast('Failed to delete', 'error');
            }
          }
        });
      });
    }

    function filterInquiries() {
      var search = document.getElementById('search-inquiries').value.toLowerCase();
      var readFilter = document.getElementById('filter-read').value;
      var subjectFilter = document.getElementById('filter-subject').value;

      var filtered = allInquiries.filter(function(inq) {
        var name = ((inq.firstName || '') + ' ' + (inq.lastName || '')).toLowerCase();
        var matchSearch = !search || name.indexOf(search) > -1 || (inq.email || '').toLowerCase().indexOf(search) > -1 || (inq.message || '').toLowerCase().indexOf(search) > -1;
        var matchRead = !readFilter || (readFilter === 'unread' && !inq.read) || (readFilter === 'read' && inq.read);
        var matchSubject = !subjectFilter || inq.subject === subjectFilter;
        return matchSearch && matchRead && matchSubject;
      });

      renderInquiries(filtered);
    }
  </script>

</body>
</html>
