<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Posts — Queen Homes Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-icon">👑</div>
        <h2><span>Queen</span> Homes<small>Admin Panel</small></h2>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-nav-label">Main</div>
        <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="properties.html"><i class="fas fa-building"></i> Properties</a>
        <a href="blog.html" class="active"><i class="fas fa-newspaper"></i> Blog Posts</a>
        <a href="inquiries.html"><i class="fas fa-envelope"></i> Inquiries</a>
        <div class="sidebar-nav-label">Settings</div>
        <a href="settings.html"><i class="fas fa-cog"></i> Site Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="admin-header">
        <div class="admin-header-left">
          <button class="menu-toggle-admin"><i class="fas fa-bars"></i></button>
          <h1>Blog Posts</h1>
        </div>
        <div class="admin-header-right">
          <a href="../insights.html" target="_blank" class="header-link"><i class="fas fa-external-link-alt"></i> View Blog</a>
          <div class="admin-user">
            <div class="admin-user-avatar">A</div>
            <span>Admin</span>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="search-input">
              <i class="fas fa-search"></i>
              <input type="text" id="search-blog" placeholder="Search blog posts...">
            </div>
            <select class="filter-select" id="filter-category">
              <option value="">All Categories</option>
              <option value="Industry">Industry</option>
              <option value="Investment">Investment</option>
              <option value="Guide">Guide</option>
              <option value="Diaspora">Diaspora</option>
              <option value="Market Update">Market Update</option>
            </select>
          </div>
          <div class="toolbar-right">
            <a href="blog-form.html" class="btn btn-primary"><i class="fas fa-plus"></i> New Post</a>
          </div>
        </div>

        <div class="card">
          <div class="card-body" style="padding: 0;">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Image</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Author</th>
                    <th>Date</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="blog-table">
                  <tr><td colspan="6"><div class="page-loader"><span class="spinner"></span></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from './js/auth.js';
    import { db, collection, getDocs, deleteDoc, doc, query, orderBy } from './js/firebase-config.js';
    import { initSidebar, setUserInitial, showToast, showConfirm, truncate, formatDate } from './js/ui-helpers.js';

    var allBlogs = [];

    requireAuth(async function(user) {
      initSidebar();
      setUserInitial(user);

      document.getElementById('logout-btn').addEventListener('click', function(e) {
        e.preventDefault();
        logout();
      });

      await loadBlogs();

      document.getElementById('search-blog').addEventListener('input', filterBlogs);
      document.getElementById('filter-category').addEventListener('change', filterBlogs);
    });

    async function loadBlogs() {
      try {
        var q = query(collection(db, 'blogs'), orderBy('createdAt', 'desc'));
        var snap = await getDocs(q);
        allBlogs = [];
        snap.forEach(function(d) {
          allBlogs.push({ id: d.id, ...d.data() });
        });
        renderBlogs(allBlogs);
      } catch (err) {
        console.error(err);
        document.getElementById('blog-table').innerHTML =
          '<tr><td colspan="6" style="padding:40px;text-align:center;color:var(--gray-500);">Could not load blog posts.</td></tr>';
      }
    }

    function renderBlogs(list) {
      var tbody = document.getElementById('blog-table');

      if (list.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="6"><div class="empty-state"><i class="fas fa-newspaper"></i><h3>No blog posts found</h3><p>Write your first blog post.</p><a href="blog-form.html" class="btn btn-primary"><i class="fas fa-plus"></i> New Post</a></div></td></tr>';
        return;
      }

      var html = '';
      list.forEach(function(b) {
        var img = b.image || 'https://via.placeholder.com/60x42/1a1a1a/737373?text=No+Image';
        html +=
          '<tr>' +
            '<td><img src="' + img + '" class="table-img" alt=""></td>' +
            '<td class="table-title">' + truncate(b.title, 40) + '</td>' +
            '<td><span class="badge badge-new">' + (b.category || '—') + '</span></td>' +
            '<td>' + (b.author || 'Queen Homes Realty') + '</td>' +
            '<td>' + formatDate(b.createdAt) + '</td>' +
            '<td><div class="action-btns">' +
              '<a href="blog-form.html?id=' + b.id + '" class="btn-icon edit" title="Edit"><i class="fas fa-pen"></i></a>' +
              '<button class="btn-icon delete" title="Delete" data-id="' + b.id + '" data-title="' + (b.title || '') + '"><i class="fas fa-trash"></i></button>' +
            '</div></td>' +
          '</tr>';
      });

      tbody.innerHTML = html;

      tbody.querySelectorAll('.delete').forEach(function(btn) {
        btn.addEventListener('click', async function() {
          var id = this.dataset.id;
          var title = this.dataset.title;
          var confirmed = await showConfirm('Delete Blog Post', 'Are you sure you want to delete "' + title + '"?');
          if (confirmed) {
            try {
              await deleteDoc(doc(db, 'blogs', id));
              showToast('Blog post deleted', 'success');
              await loadBlogs();
            } catch (err) {
              showToast('Failed to delete blog post', 'error');
            }
          }
        });
      });
    }

    function filterBlogs() {
      var search = document.getElementById('search-blog').value.toLowerCase();
      var category = document.getElementById('filter-category').value;

      var filtered = allBlogs.filter(function(b) {
        var matchSearch = !search || (b.title || '').toLowerCase().indexOf(search) > -1;
        var matchCat = !category || b.category === category;
        return matchSearch && matchCat;
      });

      renderBlogs(filtered);
    }
  </script>

</body>
</html>
